<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Bible Overlay</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

#overlay{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    text-align:center;
}

#verse{
    color:#ffffff;
    font-size:52px;
    font-weight:bold;
    text-shadow:
        -3px -3px 0 #000,
         3px -3px 0 #000,
        -3px 3px 0 #000,
         3px 3px 0 #000,
         0 0 15px #000;
}

#reference{
    margin-top:20px;
    color:#FFD700;
    font-size:34px;
    font-weight:bold;
    text-shadow:2px 2px 8px #000;
}
</style>

</head>

<body>

<div id="overlay">
    <div id="verse">
        Bienvenidos
    </div>

    <div id="reference">
        OBS Bible Overlay
    </div>
</div>

</body>
</html>
